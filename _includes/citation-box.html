<section class="citation-box reveal" data-reveal aria-labelledby="citation-title">
  <div class="citation-box__header">
    <div>
      <span class="section-kicker">Cite this work</span>
      <h2 id="citation-title">BibTeX</h2>
    </div>
    <button class="citation-copy citation-copy--primary" type="button" data-copy-citation>
      <i class="fas fa-copy" aria-hidden="true"></i><span data-copy-label>Copy BibTeX</span>
    </button>
  </div>
  <pre><code>{{ page.citation }}</code></pre>
  <textarea class="citation-source" aria-hidden="true" tabindex="-1">{{ page.citation }}</textarea>
</section>
